<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Video Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
            padding: 20px;
        }
        video {
            width: 300px;
            height: 200px;
            margin: 10px;
            border: 2px solid #333;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .status {
            padding: 5px 10px;
            border-radius: 4px;
            margin: 5px 0;
        }
        .success { background: #2d5a2d; }
        .error { background: #5a2d2d; }
        .warning { background: #5a4d2d; }
    </style>
</head>
<body>
    <h1>🎥 Direct Video URL Test</h1>
    <div id="test-container"></div>

    <script>
        const testContainer = document.getElementById('test-container');
        
        function addStatus(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            testContainer.appendChild(div);
        }

        async function testDirectUrls() {
            addStatus('🚀 Starting direct URL tests...', 'info');
            
            // Test with direct Supabase signed URLs (generated from our S3 setup)
            const testUrls = [
                // These are example signed URLs - we'll need to generate real ones
                'https://jehmrevswtimvaqgcwas.supabase.co/storage/v1/object/sign/videos/lake.mp4',
                'https://jehmrevswtimvaqgcwas.supabase.co/storage/v1/object/sign/videos/forest.mp4',
                'https://jehmrevswtimvaqgcwas.supabase.co/storage/v1/object/sign/videos/zen.mp4',
                'https://jehmrevswtimvaqgcwas.supabase.co/storage/v1/object/sign/videos/campfire.mp4'
            ];

            // First test: Try to access Supabase storage directly
            addStatus('📡 Testing Supabase storage access...', 'info');
            
            // Import Supabase client
            try {
                const { createClient } = await import('https://cdn.skypack.dev/@supabase/supabase-js');
                const supabase = createClient(
                    'https://jehmrevswtimvaqgcwas.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplaG1yZXZzd3RpbXZhcWdjd2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTAxMzM5NDUsImV4cCI6MjA2NTcwOTk0NX0.h6pd_oiQggN646LxYBYcuJZgGRNbFhzrINDsaEOYPjc'
                );
                
                addStatus('✅ Supabase client created', 'success');
                
                // List files in bucket
                const { data: files, error: filesError } = await supabase.storage
                    .from('videos')
                    .list();
                
                if (filesError) {
                    addStatus(`❌ Error listing files: ${filesError.message}`, 'error');
                    return;
                }
                
                addStatus(`✅ Found ${files.length} files in bucket`, 'success');
                files.forEach(file => {
                    addStatus(`  📁 ${file.name} (${file.metadata?.size || 'unknown'} bytes)`, 'info');
                });
                
                // Generate signed URLs and test them
                for (const file of files.filter(f => f.name.endsWith('.mp4'))) {
                    const testSection = document.createElement('div');
                    testSection.className = 'test-section';
                    testSection.innerHTML = `<h3>Testing: ${file.name}</h3>`;
                    testContainer.appendChild(testSection);
                    
                    try {
                        const { data: signedData, error: signedError } = await supabase.storage
                            .from('videos')
                            .createSignedUrl(file.name, 3600);
                        
                        if (signedError) {
                            testSection.innerHTML += `<div class="status error">❌ Signed URL error: ${signedError.message}</div>`;
                            continue;
                        }
                        
                        testSection.innerHTML += `<div class="status success">✅ Signed URL generated</div>`;
                        testSection.innerHTML += `<div class="status info">🔗 URL: ${signedData.signedUrl.substring(0, 80)}...</div>`;
                        
                        // Create video element to test
                        const video = document.createElement('video');
                        video.controls = true;
                        video.muted = true;
                        video.playsInline = true;
                        video.style.width = '100%';
                        video.style.maxWidth = '400px';
                        video.style.height = 'auto';
                        
                        // Set up event listeners
                        video.addEventListener('loadstart', () => {
                            testSection.innerHTML += `<div class="status info">⏳ Loading started...</div>`;
                        });
                        
                        video.addEventListener('loadedmetadata', () => {
                            testSection.innerHTML += `<div class="status success">✅ Metadata loaded (${video.videoWidth}x${video.videoHeight})</div>`;
                        });
                        
                        video.addEventListener('loadeddata', () => {
                            testSection.innerHTML += `<div class="status success">✅ Video data loaded</div>`;
                        });
                        
                        video.addEventListener('canplay', () => {
                            testSection.innerHTML += `<div class="status success">✅ Video can play (duration: ${video.duration.toFixed(2)}s)</div>`;
                        });
                        
                        video.addEventListener('error', (e) => {
                            const error = video.error;
                            let errorMsg = 'Unknown error';
                            if (error) {
                                switch(error.code) {
                                    case 1: errorMsg = 'MEDIA_ERR_ABORTED - fetching aborted'; break;
                                    case 2: errorMsg = 'MEDIA_ERR_NETWORK - network error'; break;
                                    case 3: errorMsg = 'MEDIA_ERR_DECODE - decoding error'; break;
                                    case 4: errorMsg = 'MEDIA_ERR_SRC_NOT_SUPPORTED - not supported'; break;
                                }
                            }
                            testSection.innerHTML += `<div class="status error">❌ Video error: ${errorMsg}</div>`;
                        });
                        
                        // Set the source and append to test section
                        video.src = signedData.signedUrl;
                        testSection.appendChild(video);
                        
                        // Test URL accessibility with fetch
                        try {
                            const response = await fetch(signedData.signedUrl, { method: 'HEAD' });
                            testSection.innerHTML += `<div class="status ${response.ok ? 'success' : 'error'}">📊 HTTP ${response.status}: ${response.statusText}</div>`;
                            if (response.ok) {
                                testSection.innerHTML += `<div class="status info">📦 Content-Type: ${response.headers.get('Content-Type')}</div>`;
                                testSection.innerHTML += `<div class="status info">📏 Content-Length: ${response.headers.get('Content-Length')} bytes</div>`;
                            }
                        } catch (fetchError) {
                            testSection.innerHTML += `<div class="status error">❌ Fetch error: ${fetchError.message}</div>`;
                        }
                        
                    } catch (error) {
                        testSection.innerHTML += `<div class="status error">❌ Test error: ${error.message}</div>`;
                    }
                    
                    // Add some spacing
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
                
            } catch (error) {
                addStatus(`❌ Supabase import/setup error: ${error.message}`, 'error');
            }
        }

        // Start the test
        testDirectUrls();
    </script>
</body>
</html>
